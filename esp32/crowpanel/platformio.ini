; PlatformIO Project Configuration — Elecrow CrowPanel Advance 5.0" (ESP32-S3)
; 800x480 IPS, ST7262 RGB panel, GT911 capacitive touch, CH340 USB-UART.
;
; This is a SEPARATE target from esp32/firmware (the 1.54" e-paper board). It
; speaks the same newline-delimited JSON serial protocol but adds `set_dashboard`
; (see ../../docs/protocol.md) and renders with LVGL instead of drawing pixels
; from host-formatted strings.

[env:crowpanel-5]
; pioarduino platform: arduino-esp32 3.x / ESP-IDF 5.x. Migrated off the archived
; `espressif32` platform to fix a WiFi heap-corruption panic (esf_buf_recycle/
; ppTask): the stock arduino 2.0.17 qio_opi libs ship a 32-byte data cache line
; (wrong for 64-byte octal-PSRAM bursts) and allocate WiFi/LWIP buffers in PSRAM.
; pioarduino's `custom_sdkconfig` recompiles the affected IDF components from
; source so those two settings can actually be corrected (see custom_sdkconfig).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; THE crash fixes — take effect via pioarduino hybrid-mode from-source recompile:
custom_sdkconfig =
    CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP=n   ; keep WiFi/LWIP buffers in internal SRAM
    CONFIG_SPIRAM_MODE_OCT=y
    CONFIG_SPIRAM_SPEED_80M=y
    CONFIG_ESP32S3_DATA_CACHE_64KB=y
    CONFIG_ESP32S3_DATA_CACHE_LINE_64B=y     ; 64-byte cache line for octal PSRAM
    ; We use no Bluetooth. Disabling it removes the BT/ble_mesh components from the
    ; from-source build — which also fixes an include collision (IDF ble_mesh's
    ; net.h vs our src/Net.h under the global `-I src`) — and frees flash + RAM.
    CONFIG_BT_ENABLED=n

; The from-source (hybrid) build compiles ALL of arduino-esp32's bundled managed
; components; several we don't use (modbus, zigbee, speech, ethernet PHYs, cloud)
; fail their config asserts on this IDF. Strip the ones we don't use — also a
; big build-time win. Kept: mdns (we use it), plus low-level deps (cbor/cjson/
; libsodium/littlefs) and the WiFi-adjacent shims.
custom_component_remove =
    espressif/esp-modbus
    espressif/esp-dsp
    espressif/dl_fft
    espressif/esp-sr
    chmorgan/esp-libhelix-mp3
    espressif/esp-zboss-lib
    espressif/esp-zigbee-lib
    espressif/esp_modem
    espressif/network_provisioning
    espressif/esp_rainmaker
    espressif/rmaker_common
    espressif/esp_insights
    espressif/esp_diag_data_store
    espressif/esp_diagnostics
    espressif/qrcode
    espressif/lan867x
    espressif/w5500
    espressif/dm9051
    espressif/ksz8851snl

; The CrowPanel programs over a CH340 on UART0 (GPIO43/44) — NOT the S3 native
; USB — so it enumerates as /dev/cu.wchusbserial* and we use the plain UART.
; Do NOT set ARDUINO_USB_CDC_ON_BOOT here (that's for the e-paper board).
build_flags =
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    ; lv_conf.h lives in include/ (which holds ONLY lv_conf.h) and we put just that
    ; dir on the global header path — so LVGL finds lv_conf.h but the from-source
    ; IDF build (pioarduino hybrid mode) can't pick up our src/*.h over IDF's own
    ; (e.g. ble_mesh's net.h vs our Net.h on the case-insensitive macOS FS).
    ; Do NOT add `-I src`.
    -I include
    ; LVGL draw buffers must live in PSRAM at this resolution — see board_config.h

; Ports are per-machine; pass --upload-port / --monitor-port explicitly or let
; PlatformIO auto-detect a single connected device.
;
; Auto-reset works on this board: esptool toggles DTR/RTS (IO0/EN) to enter the
; bootloader and hard-resets to run afterward — no manual BOOT+RST needed. (An
; older note here claimed the CH34x macOS driver rejected these ioctls; it does not.)
upload_flags =
    --before
    default_reset
    --after
    hard_reset
; 115200 (a standard termios rate) — the WCH CH34x macOS driver rejects the
; IOSSIOSPEED ioctl that nonstandard rates like 921600 need ("Inappropriate ioctl
; for device"). Slower flash, but it actually connects.
upload_speed = 115200
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson@^7.3.0
    ; LVGL 8.4 (last 8.x) + LovyanGFX 1.2.x carry the IDF5 / arduino-3.x esp_lcd
    ; and RGB-panel fixes; 1.1.16 does not compile under arduino 3.x.
    lvgl/lvgl@^8.4.0
    ; Display + touch drivers, grafted from Elecrow's verified CrowPanel Advance 5.0
    ; demo (lesson-03/BigInch_LVGL). The Advance board drives its RGB panel with
    ; LovyanGFX (Panel_RGB + Bus_RGB) and reads the GT911 through LovyanGFX's own
    ; Touch_GT911 — no separate touch lib. The backlight is enabled over I2C by a
    ; companion MCU (0x30 on the V1.1 board), handled with raw Wire calls in
    ; board_elecrow.cpp — no expander lib needed. Exact pins/timings live there too.
    lovyan03/LovyanGFX@^1.2.0

; ESP32-S3-WROOM-1-N16R8: 16 MB quad flash, 8 MB octal PSRAM.
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
