; PlatformIO Project Configuration — Elecrow CrowPanel Advance 5.0" (ESP32-S3)
; 800x480 IPS, ST7262 RGB panel, GT911 capacitive touch, CH340 USB-UART.
;
; This is a SEPARATE target from esp32/firmware (the 1.54" e-paper board). It
; speaks the same newline-delimited JSON serial protocol but adds `set_dashboard`
; (see ../../docs/protocol.md) and renders with LVGL instead of drawing pixels
; from host-formatted strings.

[env:crowpanel-5]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; The CrowPanel programs over a CH340 on UART0 (GPIO43/44) — NOT the S3 native
; USB — so it enumerates as /dev/cu.wchusbserial* and we use the plain UART.
; Do NOT set ARDUINO_USB_CDC_ON_BOOT here (that's for the e-paper board).
build_flags =
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -I src
    ; LVGL draw buffers must live in PSRAM at this resolution — see board_config.h

; Ports are per-machine; pass --upload-port / --monitor-port explicitly or let
; PlatformIO auto-detect a single connected device.
;
; The WCH CH34x macOS driver rejects the DTR/RTS reset ioctls esptool uses for
; auto-reset ("Inappropriate ioctl for device") — cable-independent. So we enter
; download mode manually (hold BOOT, tap RST, release BOOT) and pass `no_reset` to
; keep esptool from toggling those lines. It still hard-resets AFTER flashing to run.
upload_flags =
    --before
    no_reset
    --after
    hard_reset
; 115200 (a standard termios rate) — the WCH CH34x macOS driver rejects the
; IOSSIOSPEED ioctl that nonstandard rates like 921600 need ("Inappropriate ioctl
; for device"). Slower flash, but it actually connects.
upload_speed = 115200
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson@^7.3.0
    lvgl/lvgl@^8.3.11
    ; Display + touch drivers, grafted from Elecrow's verified CrowPanel Advance 5.0
    ; demo (lesson-03/BigInch_LVGL). The Advance board drives its RGB panel with
    ; LovyanGFX (Panel_RGB + Bus_RGB) and reads the GT911 through LovyanGFX's own
    ; Touch_GT911 — no separate touch lib. The backlight is enabled over I2C by a
    ; companion MCU (0x30 on the V1.1 board), handled with raw Wire calls in
    ; board_elecrow.cpp — no expander lib needed. Exact pins/timings live there too.
    lovyan03/LovyanGFX@^1.1.16

; ESP32-S3-WROOM-1-N16R8: 16 MB quad flash, 8 MB octal PSRAM.
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_build.psram_type = opi
board_upload.flash_size = 16MB
